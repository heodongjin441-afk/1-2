<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!--
    e.preventDefault() 기본 기능 막기
    e.stopPropation() 이벤트 여러개 호출되는 거 막기
    -->
    <a href="www.naver.com">네이버</a>
    <div id="mdiv" style="padding: 10px;background-color: aqua;">
        <div id="subdiv" style="padding: 10px;background-color: bisque;">
            <h1>sub</h1>
            <p>stopPropagation은 이벤트 여러개 호출 막음</p>
            <!-- sumbit 버튼을 누르게 되면 ex02.html 이동됩니다. -->
            <form action="ex02.html" id="myForm">
                <input type="text" name="" id="id">
                <input type="submit" value="페이지제출"/>
            </form>
            <script>
                myForm.addEventListener('submit', function(e){
                    // e.stopPropagation(); // 다른 이벤트 실행을 막아달라
                    e.preventDefault();
                    console.log('sumbit 막음');
                    console.log(id.value);
                    // id값을 넣었으면 ex02.html 이동
                    if(id.value.length > 0){
                        myForm.submit();
                    }else{
                        alert('아이디를 입력하세요');
                    }
                    // id값을 넣지 않으면 id 입력하세요
                })
            </script>
        </div>
    </div>
    <script>
        mdiv.addEventListener('click', function(){
            console.log('mdiv click');
        });
        subdiv.addEventListener('click', function(e){
            e.stopPropagation(); // 다른 이벤트 실행 되는거 막아달라
            console.log('subdiv click');
        });
    </script>
</body>
</html>
